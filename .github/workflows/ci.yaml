name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

permissions:
  contents: read

jobs:
  Test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-15]
    steps:
    - uses: actions/checkout@v6
    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: A10
        cache-on-failure: true
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - uses: dtolnay/rust-toolchain@1.92
    - name: Run Tests
      run: cargo test
    - name: Run Tests (release build)
      run: cargo test --release
  Nightly:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-15]
    steps:
    - uses: actions/checkout@v6
    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: A10
        cache-on-failure: true
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - uses: dtolnay/rust-toolchain@nightly
    - name: Run Tests
      run: cargo test
    - name: Run Tests (nightly feature)
      run: cargo test --features nightly
    - name: Run Tests (release build)
      run: cargo test --release
    - name: Run Tests (nightly feature, release build)
      run: cargo test --features nightly --release
  Check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        target:
        - aarch64-apple-ios
        - aarch64-apple-tvos
        - aarch64-apple-visionos
        - aarch64-apple-watchos
        - x86_64-unknown-openbsd
    steps:
    - uses: actions/checkout@v6
    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: A10
        cache-on-failure: true
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src
    - name: Check build
      run: cargo check --target ${{ matrix.target }} -Zbuild-std --all-targets
  Clippy:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-15]
    steps:
    - uses: actions/checkout@v6
    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: A10
        cache-on-failure: true
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy
    - name: Run Clippy
      run: make clippy
  Docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v6
    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: A10
        cache-on-failure: true
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - uses: dtolnay/rust-toolchain@nightly
    - name: Check docs
      run: RUSTDOCFLAGS='-D warnings' cargo doc --no-deps
  Rustfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check
  Sanitizer:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-15]
        sanitizer: [address, thread, memory, leak]
        exclude:
          # The MemorySanitizer is not supported on macOS (arm).
          - os: macos-26
            sanitizer: memory
          - os: macos-15
            sanitizer: memory
          # The LeakSanitizer is not supported on macOS (arm).
          - os: macos-26
            sanitizer: leak
          - os: macos-15
            sanitizer: leak
    steps:
    - uses: actions/checkout@v6
    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: A10
        cache-on-failure: true
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src
    - name: Install llvm-symbolizer
      if: ${{ startsWith(matrix.os, 'ubuntu') }}
      run: |
        sudo apt install -y llvm-20
        echo "ASAN_SYMBOLIZER_PATH=$(which llvm-symbolizer-20)" >> $GITHUB_ENV
    - name: Run tests with sanitizer
      run:  make test_sanitizer sanitizer=${{ matrix.sanitizer }}
